<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Flow</title>
    <link rel="stylesheet" href="style/index.css">
</head>

<body>
    <!--CABEÇALHO-->
    <header>
        <div class="topo">
            <!--LOGO DO SITE-->
            <div class="logo">
                <img src="assets/logo.png" alt="Logo do site">
                <h1></h1>
            </div>

            <!--caixa de pesquisa -->
            <div class="caixa-pesquisa">
                <img src="assets/lupa.png" alt="Lupa de pesquisa">
                <input type="text" placeholder="o que você procura?">
            </div>



            <div class="icones">
                <a href="">
                    <img src="assets/carrinho.png" alt="Carrinhos">
                    <small> Carrinho </small>
                    <p>Menu</p>

                </a>
                <a href="">
                    <img src="assets/perfil.png" alt="login">
                    <small>Olá visitante</small>
                    <p>Entrar</p>
                </a>

                <a href="">
                    <img src="assets/localização.png" alt="rastreamento">
                    <small>Rastreamento</small>
                    <p>rastrear</p>
                </a>

                <a href="">
                    <img src="assets/favoritos.png" alt="favoritos">
                    <small>Meus favoritos</small>
                    <p>entrar</p>
                </a>
            </div>
        </div>







        <!--MENU DE NAVEGAÇÃO-->
        <nav class="menu">
            <a href="https://www.canva.com/">Home</a>
            <a id="idPerfil" href="#">Perfil</a>
            <a href="#">Rastreamento</a>
            <a href="#">Departamento</a>
            <a href="#">Monte seu PC</a>
            <a href="#">Pcs Games</a>
            <a href="#">Hardware</a>

        </nav>
    </header>
    <!--AREA DO BANNER DA LOJA-->
    <div class="banner">
        <div class="imagem-banner">
            <img src="assets/banner.png" alt="Banner 1">
        </div>
        <div class="botões-banner">
            <button class="btn-comprar">COMPRAR</button>


        </div>

    </div>
    <!--FINALIZAÇÃO DA AREA DO BANNER-->

    <!--ÁREA DE OFERTAS-->
    <section class="ofertas">

        <div class="titulos-ofertas">
            <div class="texto-promoções">
                <h2> OFERTAS IMPERDÍVEIS</h2>
                <p>confira as melhores ofertas!</p>
            </div>
            <a href="#" class="ver-tudo">Ver tudo</a>
        </div>

        <div class="lista-produtos">
            <div class="card-produtos">
                <div class="imagem-botao">
                    <img src="assets/mouse.png" alt="mouse">
                    <button class="Favorito">
                        <img src="assets/favoritos.png" alt="Ícone de favorito">
                    </button>
                </div>


                <h3>Nome do Produto</h3>
                <p>R$ 99,99</p>
                <button class="btn-adicionar">
                    <img src="assets/carrinho.png" alt="Ícone da carrinho>">
                </button>
            </div>


        </div>
    </section>
</body>

</html>
