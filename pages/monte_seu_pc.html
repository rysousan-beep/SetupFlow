<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SetupFlow | Montagem de PC</title>

    <!-- CSS -->
    <link rel="stylesheet" href="/style/monte_seu_pc.css">

    <!-- JavaScript -->
    <script src="/js/monte_seu_pc.js" defer></script>

</head>
<body>

    <!--=========================================
        HEADER
    ==========================================-->
    <header id="header"></header>


    <!--=========================================
        CONTEÚDO PRINCIPAL
    ==========================================-->
    <main id="main">

        <!-- Menu lateral de etapas -->
        <aside id="sidebar">

            <!-- Etapas criadas pelo JavaScript -->
            <nav id="menu-etapas"></nav>

        </aside>


        <!-- Conteúdo Central -->
        <section id="conteudo">

            <!-- Cabeçalho da página -->
            <section id="titulo-pagina"></section>

            <!-- Barra de pesquisa e ordenação -->
            <section id="barra-filtros">

                <div id="pesquisa"></div>

                <div id="ordenacao"></div>

            </section>

            <!-- Lista de Produtos -->
            <section id="produtos"></section>

        </section>


        <!-- Painel Direito -->
        <aside id="resumo">

            <!-- Título -->
            <section id="titulo-resumo"></section>

            <!-- Compatibilidade -->
            <section id="compatibilidade"></section>

            <!-- Produtos Selecionados -->
            <section id="produtos-selecionados"></section>

            <!-- Valor Total -->
            <section id="total-compra"></section>

            <!-- Botão -->
            <section id="acoes-resumo"></section>

        </aside>

    </main>


    <!--=========================================
        RODAPÉ
    ==========================================-->
    <footer id="footer"></footer>

</body>
</html>
