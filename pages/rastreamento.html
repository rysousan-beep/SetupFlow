<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title id="pageTitle"></title>

    <link rel="stylesheet"
          href="/style/rastreamento.css">

</head>

<body>

    <!--========================================-->
    <!-- HEADER -->
    <!--========================================-->

    <header>

        <div class="container header-container">

            <div class="logo-area">

                <img id="logo"
                     src=""
                     alt="">

            </div>

            <nav>

                <ul id="menuPrincipal"
                    class="menu">

                    <!-- Criado pelo JavaScript -->

                </ul>

            </nav>

        </div>

    </header>

    <!--========================================-->
    <!-- MAIN -->
    <!--========================================-->

    <main>

        <div class="container rastreamento-container">

            <!--========================================-->
            <!-- SIDEBAR -->
            <!--========================================-->

            <aside class="sidebar">

                <!-- Pedido -->

                <section class="pedido">

                    <h1 id="tituloRastreamento"></h1>

                    <p id="numeroPedido"></p>

                </section>

                <!-- Produto -->

                <section id="produtoCard"
                         class="produto-card">

                </section>

                <!-- Previsão -->

                <section class="previsao">

                    <h3 id="tituloPrevisao"></h3>

                    <span id="horarioEntrega"></span>

                </section>

                <!-- Timeline -->

                <section class="timeline">

                    <div id="listaStatus">

                        <!-- Criado pelo JavaScript -->

                    </div>

                </section>

                <!-- Entregador -->

                <section id="entregadorCard"
                         class="entregador-card">

                </section>

            </aside>

            <!--========================================-->
            <!-- MAPA -->
            <!--========================================-->

            <section class="mapa-area">

                <div id="mapaContainer">

                    <img id="imagemMapa"
                         src=""
                         alt="">

                    <!-- Marcadores -->

                    <div id="marcadoresMapa">

                        <!-- Criado pelo JavaScript -->

                    </div>

                    <!-- Controles -->

                    <div class="controles-mapa">

                        <button id="btnZoomMais"></button>

                        <button id="btnZoomMenos"></button>

                        <button id="btnLocalizacao"></button>

                    </div>

                </div>

                <!-- Card Flutuante -->

                <div id="produtoFlutuante"
                     class="produto-flutuante">

                </div>

            </section>

        </div>

    </main>

    <!--========================================-->
    <!-- FOOTER -->
    <!--========================================-->

    <footer>

        <div class="container footer-container">

            <p id="copyright"></p>

            <a id="linkPrivacidade"
               href=""></a>

        </div>

    </footer>

    <script src="/js/rastreamento.js"></script>

</body>

</html>
