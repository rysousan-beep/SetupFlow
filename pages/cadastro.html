<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro | SetupFlow Tech</title>

    <!-- CSS -->
    <link rel="stylesheet" href="/style/cadastro.cssnpm install express mysql2 cors">

    <!-- JavaScript -->
    <script src="/js/cadastro.js" defer></script>

</head>
<body>

    <!--=========================================
        HEADER
    ==========================================-->
    <header id="header"></header>


    <!--=========================================
        CONTEÚDO PRINCIPAL
    ==========================================-->
    <main id="main">

        <!-- Banner Superior -->
        <section id="banner"></section>

        <!-- Área de Cadastro -->
        <section id="cadastro">

            <div id="cadastro-container">

                <!-- Cabeçalho do Formulário -->
                <div id="cadastro-topo"></div>

                <!-- Formulário (Campos criados pelo JS) -->
                <form id="form-cadastro"></form>

                <!-- Botões -->
                <div id="cadastro-botoes"></div>

            </div>

        </section>

        <!-- Área de Benefícios -->
        <section id="beneficios">

            <div id="beneficios-container"></div>

        </section>

    </main>


    <!--=========================================
        RODAPÉ
    ==========================================-->
    <footer id="footer"></footer>

</body>
</html>
