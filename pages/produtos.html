<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title id="pageTitle"></title>

    <link rel="stylesheet"
          href="/style/detalhe.css">

</head>

<body>

    <!--========================================-->
    <!-- HEADER -->
    <!--========================================-->

    <header>

        <div class="container header-container">

            <div class="logo-area">

                <img id="logo"
                     src=""
                     alt="">

                <h1 id="tituloPagina"></h1>

            </div>

            <nav>

                <ul class="menu">

                    <li>

                        <a id="btnHome"
                           href="">

                            <img id="iconeHome"
                                 src=""
                                 alt="">

                            <span id="textoHome"></span>

                        </a>

                    </li>

                </ul>

            </nav>

        </div>

    </header>

    <!--========================================-->
    <!-- MAIN -->
    <!--========================================-->

    <main>

        <!--========================================-->
        <!-- PRODUTO -->
        <!--========================================-->

        <section class="produto">

            <div class="container produto-container">

                <!-- Imagem -->

                <div class="produto-imagem">

                    <img id="imagemProduto"
                         src=""
                         alt="">

                </div>

                <!-- Informações -->

                <div class="produto-info">

                    <h2 id="nomeProduto"></h2>

                    <div class="preco-area">

                        <span id="precoProduto"></span>

                    </div>

                    <ul id="listaCaracteristicas">

                        <!-- Características criadas pelo JS -->

                    </ul>

                    <div class="acoes">

                        <button id="btnCarrinho"
                                type="button">
                        </button>

                        <button id="btnComprar"
                                type="button">
                        </button>

                    </div>

                </div>

            </div>

        </section>

        <!--========================================-->
        <!-- AVALIAÇÕES -->
        <!--========================================-->

        <section class="avaliacoes">

            <div class="container">

                <div class="titulo-avaliacoes">

                    <h2 id="tituloAvaliacoes"></h2>

                    <p id="descricaoAvaliacoes"></p>

                </div>

                <div id="listaAvaliacoes">

                    <!-- Cards criados pelo JavaScript -->

                </div>

            </div>

        </section>

    </main>

    <!--========================================-->
    <!-- FOOTER -->
    <!--========================================-->

    <footer>

        <div class="container footer-container">

            <p id="copyright"></p>

            <a id="linkPrivacidade"
               href=""></a>

        </div>

    </footer>

    <script src="/js/detalhe.js"></script>

</body>

</html>
