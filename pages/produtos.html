<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>produto</title>

    <!--CONEXÃO COM O CSS-->
    <link rel="stylesheet" href="/style/produtos.css">
    <!--LOGO DA EMPRESA PARA O NAVEGADOR-->
    <link rel="icon" type="image/png" href="/assets/logo.nv.png">

</head>

<body>

    <header>
        <div class="topo">
            <!--LOGO DO SITE-->
            <div class="logo">
                <img src="/assets/logo.nv.png" alt="Logo do site">
                <h1></h1>
            </div>

            <!--caixa de pesquisa -->
            <div class="caixa-pesquisa">
                <img src="/assets/lupa.png" alt="Lupa de pesquisa">
                <input type="text" placeholder="o que você procura?">
            </div>



            <div class="icones">
                <a href="">
                    <img src="/assets/carrinho.png" alt="Carrinhos">
                    <small> Carrinho </small>
                    <p>Menu</p>

                </a>
                <a href="">
                    <img src="/assets/perfil.png" alt="login">
                    <small>Perfil</small>
                    <p>Entrar</p>
                </a>

                <a href="">
                    <img src="/assets/localização.png" alt="rastreamento">
                    <small>Rastreamento</small>
                    <p>rastrear</p>
                </a>

                <a href="">
                    <img src="/assets/favoritos.png" alt="favoritos">
                    <small>Meus favoritos</small>
                    <p>entrar</p>
                </a>
            </div>
        </div>







        <!--MENU DE NAVEGAÇÃO-->
        <nav class="menu">
            <a href="">Home</a>
            <a href="#">Departamento</a>
            <a href="#">Monte seu PC</a>
            <a href="#">Pcs Games</a>
            <a href="#">Hardware</a>

        </nav>
    </header>


    <!--ÁREA DOS DADOS DO PRODUTO-->
    <div class="area-detalhes">
        <div class="area-imagens">
            <div class="img-lateral" id="img-lateral">

            </div>
            <div class="img-principal" id="img-principal">
                <img id="imagem-maior">

            </div>


        </div>
        <div class="area-textos">
          <!--nome do produto-->
         <h1 id="nome-produto"></h1>
         <!--area das avaliações do produto-->
        <div class="avaliacoes-produto">
         <img id="estrela-avaliacao">
         <span id="valor-avaliacao"></span>
        </div>

        <p id="preco-antigo"></p>
            <!--area do preço promocional-->
            <div class="preco-promocional">
                <p id="preco-promocional"></p>
                <span id="desconto"></span>
            </div>

         <div id="tamanho"></div>
         <div id="cores"></div>
         <div class="quantidade">
             <button id="diminuir"></button>
             <span id="numero-quantidade"></span>
             <button id="aumentar"></button>
         </div>

         <div class="bnt-add-carrinho">
              <button id="bnt-add-carrinho"></button>
         </div>

        <div class="area-frete">
            <p>calcular o frete</p>
            <input id="cep">
            <button id="bnt-calcular-frete">calcular</button>
        </div>


        </div>
    </div>

        <!--FAZENDO A CONEXÃO COM JAVASCRIPT-->
        <script src="/js/produto.js"></script>
</body>

</html>
