<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title id="pageTitle"></title>

    <link rel="stylesheet" href="/style/pagamento.css">

</head>

<body>

    <!--========================================-->
    <!-- HEADER -->
    <!--========================================-->

    <header>

        <div class="container header-container">

            <div class="logo-area">

                <img id="logo" src="" alt="">

                <h1 id="tituloPagina"></h1>

            </div>

            <nav>

                <ul class="menu">

                    <li>

                        <a id="btnHome" href="">

                            <img id="iconeHome" src="" alt="">

                            <span id="textoHome"></span>

                        </a>

                    </li>

                </ul>

            </nav>

        </div>

    </header>

    <!--========================================-->
    <!-- MAIN -->
    <!--========================================-->

    <main>

        <section class="pagamento">

            <div class="container">

                <!-- Cabeçalho -->

                <div class="titulo-pagina">

                    <h2 id="tituloFormulario"></h2>

                    <p id="descricaoFormulario"></p>

                </div>

                <!-- Formulário -->

                <form id="formPagamento">

                    <div class="grid-form">

                        <!-- Nome -->

                        <div class="campo">

                            <label id="labelNome" for="nome"></label>

                            <input
                                id="nome"
                                type="text"
                                placeholder="">

                            <small id="ajudaNome"></small>

                        </div>

                        <!-- Telefone -->

                        <div class="campo">

                            <label id="labelTelefone" for="telefone"></label>

                            <input
                                id="telefone"
                                type="tel"
                                placeholder="">

                            <small id="ajudaTelefone"></small>

                        </div>

                        <!-- CEP -->

                        <div class="campo">

                            <label id="labelCep" for="cep"></label>

                            <input
                                id="cep"
                                type="text"
                                placeholder="">

                            <small id="ajudaCep"></small>

                        </div>

                        <!-- Forma de pagamento -->

                        <div class="campo">

                            <label id="labelPagamento" for="pagamentoMetodo"></label>

                            <select id="pagamentoMetodo">

                            </select>

                            <small id="ajudaPagamento"></small>

                        </div>

                        <!-- Observações -->

                        <div class="campo">

                            <label id="labelObservacao" for="observacao"></label>

                            <input
                                id="observacao"
                                type="text"
                                placeholder="">

                            <small id="ajudaObservacao"></small>

                        </div>

                        <!-- Cupom -->

                        <div class="campo">

                            <label id="labelCupom" for="cupom"></label>

                            <input
                                id="cupom"
                                type="text"
                                placeholder="">

                            <small id="ajudaCupom"></small>

                        </div>

                    </div>

                    <!-- Botões -->

                    <div class="acoes">

                        <button
                            id="btnVoltar"
                            type="button">
                        </button>

                        <button
                            id="btnFinalizar"
                            type="submit">
                        </button>

                    </div>

                </form>

            </div>

        </section>

    </main>

    <!--========================================-->
    <!-- FOOTER -->
    <!--========================================-->

    <footer>

        <div class="container footer-container">

            <p id="copyright"></p>

            <a id="linkPrivacidade" href=""></a>

        </div>

    </footer>

    <script src="/js/pagamento.js"></script>

</body>

</html>
