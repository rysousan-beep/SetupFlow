<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title id="pageTitle"></title>

    <link rel="stylesheet" href="/style/login.css">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header>

        <div class="container">

            <div class="logo-area">

                <img id="logo" src="" alt="">

                <h1 id="empresaNome"></h1>

            </div>

        </div>


    <div class="menu">
        <a href="login.html" class="active">Entrar</a>
        <a href="pages/cadastro.html">Criar Conta</a>
    </div>


    </header>

    <!-- ================= MENU ================= -->

    <nav>

        <ul id="menu"></ul>

    </nav>

    <!-- ================= MAIN ================= -->

    <main>

        <!-- LOGIN -->

        <section class="login">

            <div class="container-login">

                <div class="login-info">

                    <h2 id="tituloLogin"></h2>

                    <p id="descricaoLogin"></p>

                    <form id="formLogin">

                        <input
                            id="email"
                            type="email"
                            placeholder=""
                        >

                        <input
                            id="senha"
                            type="password"
                            placeholder=""
                        >

                        <div class="botoes">

                            <button
                                id="btnEntrar"
                                type="button">
                            </button>

                            <button
                                id="btnCadastrar"
                                type="button">
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </section>

        <!-- BENEFÍCIOS -->

        <section class="beneficios">

            <div class="beneficio">

                <div class="icone">

                    <img id="icone1" src="" alt="">

                </div>

                <h3 id="tituloCard1"></h3>

                <p id="descricaoCard1"></p>

                <strong id="destaqueCard1"></strong>

            </div>

            <div class="beneficio">

                <div class="icone">

                    <img id="icone2" src="" alt="">

                </div>

                <h3 id="tituloCard2"></h3>

                <p id="descricaoCard2"></p>

                <strong id="destaqueCard2"></strong>

            </div>

        </section>

    </main>

    <!-- ================= FOOTER ================= -->

    <footer>

        <p id="copyright"></p>

        <a id="linkPrivacidade" href=""></a>

    </footer>

    <script src="/js/login.js"></script>

</body>

</html>
