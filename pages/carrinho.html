<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title id="pageTitle"></title>

    <link rel="stylesheet"
          href="/style/itens-no-carrinho.css">

</head>

<body>

    <!--========================================-->
    <!-- HEADER -->
    <!--========================================-->

    <header>

        <div class="container header-container">

            <div class="header-info">

                <div class="logo-area">

                    <img id="logo"
                         src=""
                         alt="">

                    <h1 id="tituloPagina"></h1>

                </div>

                <a id="linkHome"
                   href=""></a>

            </div>

            <button id="btnLimparCarrinho"
                    type="button">
            </button>

        </div>

    </header>

    <!--========================================-->
    <!-- MAIN -->
    <!--========================================-->

    <main>

        <div class="container">

            <section class="conteudo-carrinho">

                <!--========================-->
                <!-- PRODUTOS -->
                <!--========================-->

                <section class="produtos">

                    <div class="cabecalho-produtos">

                        <h2 id="tituloProdutos"></h2>

                        <span id="tituloQuantidade"></span>

                        <span id="tituloPreco"></span>

                    </div>

                    <div id="listaCarrinho">

                        <!-- Produtos criados pelo JavaScript -->

                    </div>

                </section>

                <!--========================-->
                <!-- RESUMO -->
                <!--========================-->

                <aside class="resumo">

                    <h2 id="tituloResumo"></h2>

                    <div id="listaResumo">

                        <!-- Resumo criado pelo JS -->

                    </div>

                    <button id="btnFinalizar"
                            type="button">
                    </button>

                    <button id="btnFrete"
                            type="button">
                    </button>

                </aside>

            </section>

            <!--========================-->
            <!-- PEDIDOS ANTERIORES -->
            <!--========================-->

            <section class="pedidos">

                <h2 id="tituloPedidos"></h2>

                <div id="listaPedidos">

                    <!-- Cards criados pelo JS -->

                </div>

            </section>

        </div>

    </main>

    <!--========================================-->
    <!-- FOOTER -->
    <!--========================================-->

    <footer>

        <div class="container footer-container">

            <p id="copyright"></p>

            <a id="linkPrivacidade"
               href=""></a>

        </div>

    </footer>

    <script src="/js/itens-no-carrinho.js"></script>

</body>

</html>
