<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard do Lojista</title>

    <link rel="stylesheet" href="/style/home-lojista.css">

</head>

<body>

    <!-- ========================= -->
    <!-- CONTAINER PRINCIPAL -->
    <!-- ========================= -->

    <div class="container">

        <!-- ========================= -->
        <!-- MENU LATERAL -->
        <!-- ========================= -->

        <aside class="sidebar">

            <div class="logo">

                <div class="logoImagem"></div>

                <h2 id="nomeLojista">
                    Home do Lojista
                </h2>

            </div>

            <nav class="menu">

                <ul>

                    <li class="ativo">
                        <a href="#" id="menuInicio"></a>
                    </li>

                    <li>
                        <a href="#" id="menuPedidos"></a>
                    </li>

                    <li>
                        <a href="#" id="menuPromocoes"></a>
                    </li>

                    <li>
                        <a href="#" id="menuProdutos"></a>
                    </li>

                    <li>
                        <a href="#" id="menuAnalytics"></a>
                    </li>

                    <li>
                        <a href="#" id="menuMensagens"></a>
                    </li>

                    <li>
                        <a href="#" id="menuConfiguracoes"></a>
                    </li>

                </ul>

            </nav>

        </aside>

        <!-- ========================= -->
        <!-- ÁREA PRINCIPAL -->
        <!-- ========================= -->

        <main class="conteudo">

            <!-- ========================= -->
            <!-- TOPO -->
            <!-- ========================= -->

            <header class="topbar">

                <nav class="menuSuperior">

                    <a href="#" id="topHome"></a>

                    <a href="#" id="topPedidos"></a>

                    <a href="#" id="topProdutos"></a>

                </nav>

                <div class="pesquisa">

                    <input
                        type="search"
                        id="campoPesquisa"
                        placeholder="">

                    <button id="btnPesquisar">

                        <i class="fa-solid fa-magnifying-glass"></i>

                    </button>

                </div>

            </header>

            <!-- ========================= -->
            <!-- HERO -->
            <!-- ========================= -->

            <section class="hero">

                <div class="heroTexto">

                    <h1 id="tituloBoasVindas"></h1>

                    <p id="descricaoBoasVindas"></p>

                    <input
                        type="text"
                        id="buscarProdutos"
                        placeholder="">

                    <div class="botoesHero">

                        <button id="btnRelatorios"></button>

                        <button id="btnOferta"></button>

                    </div>

                    <div class="filtros">

                        <button id="btnHoje"></button>

                        <button id="btn7Dias"></button>

                        <button id="btn30Dias"></button>

                    </div>

                </div>

                <div class="heroImagem">

                    <img
                        id="bannerDashboard"
                        src=""
                        alt="">

                </div>

            </section>

            <!-- ========================= -->
            <!-- RESUMO -->
            <!-- ========================= -->

            <section class="resumo">

                <h2 id="tituloResumo"></h2>

                <p id="descricaoResumo"></p>

                <div class="acoesResumo">

                    <button id="btnConfigurar"></button>

                    <button id="btnExportar"></button>

                </div>

                <div class="cardsResumo">

                    <div class="card">

                        <span id="tituloReceita"></span>

                        <h3 id="valorReceita"></h3>

                        <small id="percentualReceita"></small>

                    </div>

                    <div class="card">

                        <span id="tituloPedidos"></span>

                        <h3 id="valorPedidos"></h3>

                        <small id="percentualPedidos"></small>

                    </div>

                    <div class="card">

                        <span id="tituloTicket"></span>

                        <h3 id="valorTicket"></h3>

                        <small id="percentualTicket"></small>

                    </div>

                </div>

            </section>

        </main>

    </div>

    <script src="https://kit.fontawesome.com/yourkit.js"></script>

    <script src="/js/home-lojista.js"></script>

</body>

</html>

<!-- ========================= -->
<!-- DESEMPENHO DE VENDAS -->
<!-- ========================= -->

<section class="desempenho">

    <div class="cabecalhoDesempenho">

        <h2 id="tituloDesempenho"></h2>

        <p id="descricaoDesempenho"></p>

        <div class="acoesDesempenho">

            <button id="btnBaixarGrafico"></button>

            <button id="btnAnalisar"></button>

        </div>

    </div>

    <div class="graficos">

        <!-- ========================= -->
        <!-- GRÁFICO DE LINHA -->
        <!-- ========================= -->

        <div class="graficoCard">

            <div class="graficoHeader">

                <h3 id="tituloGraficoLinha"></h3>

                <span id="subtituloGraficoLinha"></span>

            </div>

            <div class="graficoContainer">

                <canvas id="graficoLinha"></canvas>

            </div>

        </div>

        <!-- ========================= -->
        <!-- GRÁFICO DE BARRAS -->
        <!-- ========================= -->

        <div class="graficoCard">

            <div class="graficoHeader">

                <h3 id="tituloGraficoBarra"></h3>

                <span id="subtituloGraficoBarra"></span>

            </div>

            <div class="graficoContainer">

                <canvas id="graficoBarra"></canvas>

            </div>

        </div>

    </div>

</section>

<!-- ========================================== -->
<!-- ATUALIZAR STATUS DE PROMOÇÕES -->
<!-- ========================================== -->

<section class="statusPromocoes">

    <div class="cabecalhoPromocao">

        <div class="imagemPromocao">

            <img
                id="imagemPromocao"
                src=""
                alt="">

        </div>

        <div class="textoPromocao">

            <h2 id="tituloPromocao"></h2>

            <p id="descricaoPromocao"></p>

        </div>

    </div>

    <form class="formularioPromocao">

        <div class="campo">

            <label id="labelTipoPromocao" for="tipoPromocao"></label>

            <input
                type="text"
                id="tipoPromocao"
                placeholder="">

            <small id="ajudaTipoPromocao"></small>

        </div>

        <div class="campo">

            <label id="labelDuracaoPromocao" for="duracaoPromocao"></label>

            <input
                type="text"
                id="duracaoPromocao"
                placeholder="">

            <small id="ajudaDuracaoPromocao"></small>

        </div>

    </form>

    <div class="acoesPromocao">

        <button
            type="button"
            id="btnSalvarRascunho">
        </button>

        <button
            type="button"
            id="btnPublicarPromocao">
        </button>

    </div>

</section>
