<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title id="pageTitle"></title>

    <link rel="stylesheet"
          href="/style/favorito.css">

</head>

<body>

    <!--================ HEADER ================-->

    <header id="headerPrincipal">

        <div class="container header-container">

            <!-- Logo -->

            <div id="logoArea"
                 class="logo-area">

                <img id="logo"
                     src=""
                     alt="Logo">

            </div>

            <!-- Menu -->

            <nav class="menu">

                <ul id="menuPrincipal">

                    <!-- Criado pelo JavaScript -->

                </ul>

            </nav>

            <!-- Pesquisa -->

            <div class="pesquisa-area">

                <input
                    type="search"
                    id="campoPesquisa"
                    placeholder="">

                <button
                    id="btnPesquisar"
                    type="button">

                    🔍

                </button>

            </div>

            <!-- Usuário -->

            <div
                id="usuarioArea"
                class="usuario-area">

                <img
                    id="avatarUsuario"
                    src=""
                    alt="Usuário">

            </div>

        </div>

    </header>

    <!--================ MAIN ================-->

    <main class="container">

        <!-- Cabeçalho -->

        <section
            class="pagina-topo">

            <h1 id="tituloPagina"></h1>

            <p id="subtituloPagina"></p>

        </section>

        <!-- Produtos Favoritos -->

        <section
            class="favoritos-section">

            <div
                id="listaFavoritos"
                class="grid-favoritos">

                <!-- Cards criados pelo JavaScript -->

            </div>

        </section>

        <!-- Estado vazio -->

        <section
            id="favoritosVazio"
            class="favoritos-vazio oculto">

            <!-- Criado pelo JavaScript -->

        </section>

        <!-- Botões -->

        <section
            class="acoes-favoritos">

            <div
                id="botoesFavoritos">

                <!-- Criado pelo JavaScript -->

            </div>

        </section>

    </main>

    <!--================ MODAL ================-->

    <div
        id="modalProduto"
        class="modal oculto">

        <div
            id="modalConteudo"
            class="modal-conteudo">

            <!-- Conteúdo criado pelo JavaScript -->

        </div>

    </div>

    <!--================ LOADING ================-->

    <div
        id="loading"
        class="loading oculto">

        <div class="spinner"></div>

    </div>

    <!--================ TOAST ================-->

    <div
        id="toast"
        class="toast oculto">

    </div>

    <!--================ FOOTER ================-->

    <footer>

        <div
            class="container footer-container">

            <div
                id="footerEsquerda">

            </div>

            <div
                id="footerCentro">

            </div>

            <div
                id="footerDireita">

            </div>

        </div>

    </footer>

    <script src="/js/favorito.js"></script>

</body>

</html>
