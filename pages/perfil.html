<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title id="pageTitle"></title>

    <link rel="stylesheet"
          href="/style/perfil.css">

</head>

<body>

    <!--========================================-->
    <!-- HEADER -->
    <!--========================================-->

    <header>

        <div class="container header-container">

            <div class="logo-area">

                <img id="logo"
                     src=""
                     alt="">

            </div>

            <nav>

                <ul id="menuPrincipal">

                    <!-- JS -->

                </ul>

            </nav>

            <div class="usuario-area">

                <img id="avatarHeader"
                     src=""
                     alt="">

            </div>

        </div>

    </header>

    <!--========================================-->
    <!-- CONTEÚDO -->
    <!--========================================-->

    <main class="container">

        <!-- Cabeçalho da página -->

        <section class="perfil-topo">

            <h1 id="tituloPagina"></h1>

            <p id="subTituloPagina"></p>

        </section>

        <!-- Foto -->

        <section class="foto-card">

            <div class="foto-container">

                <img id="fotoPerfil"
                     src=""
                     alt="">

            </div>

            <div class="foto-info">

                <h2 id="tituloFoto"></h2>

                <p id="descricaoFoto"></p>

                <div id="botoesFoto"
                     class="grupo-botoes">

                </div>

            </div>

        </section>

        <!-- Dados -->

        <section class="card">

            <h2 id="tituloContato"></h2>

            <div id="dadosContato"
                 class="grid-form">

                <!-- JS -->

            </div>

        </section>

        <!-- Segurança -->

        <section class="card">

            <h2 id="tituloSenha"></h2>

            <p id="descricaoSenha"></p>

            <div id="dadosSenha"
                 class="grid-form">

                <!-- JS -->

            </div>

        </section>

        <!-- Aviso -->

        <section id="avisoSeguranca"
                 class="aviso">

        </section>

        <!-- Botões -->

        <section class="acoes">

            <div id="acoesPerfil">

                <!-- JS -->

            </div>

        </section>

    </main>

    <!--========================================-->
    <!-- FOOTER -->
    <!--========================================-->

    <footer>

        <div class="container footer-container">

            <div id="footerEsquerda"></div>

            <div id="footerCentro"></div>

            <div id="footerDireita"></div>

        </div>

    </footer>

    <script src="/js/perfil.js"></script>

</body>

</html>
