<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PCs Prontos</title>

    <link rel="stylesheet" href="/style/pcs_montados.css">

</head>

<body>

    <!--==========================
        HEADER
    ===========================-->

    <header id="header"></header>

    <!--==========================
        MAIN
    ===========================-->

    <main id="main">

        <!-- Banner -->
        <section id="banner"></section>

        <!-- Conteúdo -->
        <section id="conteudo">

            <!-- Sidebar -->
            <aside id="sidebar">

                <div id="filtros"></div>

            </aside>

            <!-- Produtos -->
            <section id="produtos-area">

                <div id="produtos-topo">

                    <div id="titulo-produtos"></div>

                    <div id="ordenacao"></div>

                </div>

                <section id="lista-produtos"></section>

            </section>

        </section>

    </main>

    <!--==========================
        FOOTER
    ===========================-->

    <footer id="footer"></footer>

    <!--====================================================
                    TEMPLATE MENU
    =====================================================-->

    <template id="template-menu">

        <nav class="menu">

            <div class="menu-logo"></div>

            <ul class="menu-links"></ul>

            <div class="menu-acoes"></div>

        </nav>

    </template>

    <!--====================================================
                    TEMPLATE BANNER
    =====================================================-->

    <template id="template-banner">

        <div class="banner">

            <div class="banner-imagem"></div>

            <div class="banner-overlay"></div>

            <div class="banner-info">

                <span class="banner-tag"></span>

                <h1 class="banner-titulo"></h1>

                <p class="banner-subtitulo"></p>

                <button class="banner-botao"></button>

            </div>

        </div>

    </template>

    <!--====================================================
                    TEMPLATE FILTROS
    =====================================================-->

    <template id="template-filtro">

        <div class="bloco-filtro">

            <h3 class="titulo-filtro"></h3>

            <div class="conteudo-filtro"></div>

        </div>

    </template>

    <!--====================================================
                    TEMPLATE PRODUTO
    =====================================================-->

    <template id="template-produto">

        <article class="produto-card">

            <div class="produto-topo">

                <span class="produto-etiqueta"></span>

            </div>

            <div class="produto-imagem"></div>

            <div class="produto-info">

                <h2 class="produto-nome"></h2>

                <ul class="produto-especificacoes"></ul>

                <div class="produto-precos">

                    <small class="produto-a-vista"></small>

                    <strong class="produto-preco"></strong>

                    <small class="produto-parcelado"></small>

                </div>

                <button class="produto-botao"></button>

            </div>

        </article>

    </template>

    <!--====================================================
                    TEMPLATE RODAPÉ
    =====================================================-->

    <template id="template-footer">

        <div class="footer-container">

            <div class="footer-logo"></div>

            <div class="footer-links"></div>

            <div class="footer-redes"></div>

            <div class="footer-copy"></div>

        </div>

    </template>

    <!--====================================================
                    TEMPLATE LINK MENU
    =====================================================-->

    <template id="template-link-menu">

        <li class="menu-item">

            <a href="#" class="menu-link"></a>

        </li>

    </template>

    <!--====================================================
                TEMPLATE ITEM FILTRO
    =====================================================-->

    <template id="template-checkbox">

        <label class="checkbox-item">

            <input type="checkbox">

            <span></span>

        </label>

    </template>

    <!--====================================================
                TEMPLATE ESPECIFICAÇÃO
    =====================================================-->

    <template id="template-especificacao">

        <li class="spec-item"></li>

    </template>

    <!--====================================================
                TEMPLATE LINK FOOTER
    =====================================================-->

    <template id="template-footer-link">

        <a href="#" class="footer-link"></a>

    </template>

    <!--====================================================
                TEMPLATE REDE SOCIAL
    =====================================================-->

    <template id="template-social">

        <a href="#" class="social-item"></a>

    </template>

    <script src="/js/pcs_montados.js"></script>

</body>

</html>
