<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title id="pageTitle">Cadastrar Produto</title>

    <link
        rel="stylesheet"
        href="/style/cadastro-produto.css">

</head>

<body>

    <!-- ================= SIDEBAR ================= -->

    <aside id="sidebar">

        <!-- Criado pelo JavaScript -->

    </aside>

    <!-- ================= CONTEÚDO ================= -->

    <div id="app">

        <!-- ================= HEADER ================= -->

        <header id="header">

            <!-- Criado pelo JavaScript -->

        </header>

        <!-- ================= MAIN ================= -->

        <main id="mainContent">

            <!-- Breadcrumb -->

            <section id="breadcrumb">

                <!-- Criado pelo JavaScript -->

            </section>

            <!-- Título -->

            <section id="pageHeader">

                <h1 id="tituloPagina"></h1>

                <p id="subtituloPagina"></p>

            </section>

            <!-- Formulário -->

            <section id="formSection">

                <form id="produtoForm">

                    <div id="formGrid">

                        <!-- Campos criados pelo JS -->

                    </div>

                    <!-- Upload -->

                    <div id="uploadArea">

                        <!-- Criado pelo JS -->

                    </div>

                    <!-- Galeria -->

                    <div id="galeriaImagens">

                        <!-- Criado pelo JS -->

                    </div>

                    <!-- Informações adicionais -->

                    <div id="informacoesAdicionais">

                        <!-- Switches criados pelo JS -->

                    </div>

                    <!-- Botões -->

                    <div id="acoesFormulario">

                        <!-- Criado pelo JS -->

                    </div>

                </form>

            </section>

        </main>

        <!-- ================= FOOTER ================= -->

        <footer id="footer">

            <!-- Criado pelo JavaScript -->

        </footer>

    </div>

    <!-- ================= MODAL ================= -->

    <div
        id="modal"
        class="oculto">

        <div id="modalConteudo">

            <!-- Criado pelo JavaScript -->

        </div>

    </div>

    <!-- ================= TOAST ================= -->

    <div
        id="toast"
        class="toast oculto">

    </div>

    <!-- ================= LOADING ================= -->

    <div
        id="loading"
        class="loading oculto">

        <div class="spinner"></div>

    </div>

    <script src="/js/cadastro-produto.js"></script>

</body>

</html>
