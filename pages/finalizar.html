<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title id="pageTitle">Pagamento</title>

    <link rel="stylesheet"
          href="/style/finalizar.css">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header id="headerPrincipal">

        <!-- Criado pelo JavaScript -->

    </header>

    <!-- ================= MAIN ================= -->

    <main class="container">

        <!-- ========= MÉTODOS DE PAGAMENTO ========= -->

        <section class="payment-methods">

            <div class="section-header">

                <h1 id="tituloPagina"></h1>

                <p id="subtituloPagina"></p>

            </div>

            <div id="listaMetodos"
                 class="payment-grid">

                <!-- Cards criados pelo JavaScript -->

            </div>

        </section>

        <!-- ========= FORMULÁRIO ========= -->

        <section class="payment-form-section">

            <div class="section-header">

                <h2 id="tituloFormulario"></h2>

                <p id="descricaoFormulario"></p>

            </div>

            <form id="formPagamento">

                <div id="camposFormulario"
                     class="form-grid">

                    <!-- Campos criados pelo JavaScript -->

                </div>

                <div class="form-buttons">

                    <button
                        type="button"
                        id="btnVoltar">

                        Voltar

                    </button>

                    <button
                        type="submit"
                        id="btnPagar">

                        Pagar

                    </button>

                </div>

            </form>

        </section>

        <!-- ========= RESUMO ========= -->

        <section class="order-summary">

            <div class="section-header">

                <h2 id="tituloResumo"></h2>

                <p id="descricaoResumo"></p>

            </div>

            <div id="cardsResumo"
                 class="summary-grid">

                <!-- Cards criados pelo JavaScript -->

            </div>

        </section>

    </main>

    <!-- ================= MODAL ================= -->

    <div id="modal"
         class="modal oculto">

        <div id="modalConteudo"
             class="modal-content">

            <!-- Criado pelo JavaScript -->

        </div>

    </div>

    <!-- ================= LOADING ================= -->

    <div id="loading"
         class="loading oculto">

        <div class="spinner"></div>

    </div>

    <!-- ================= TOAST ================= -->

    <div id="toast"
         class="toast oculto">

    </div>

    <!-- ================= FOOTER ================= -->

    <footer>

        <div class="container">

            <div id="footerContainer">

                <!-- Criado pelo JavaScript -->

            </div>

        </div>

    </footer>

    <script src="/js/finalizar.js"></script>

</body>

</html>
