<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title id="pageTitle"></title>

    <link rel="stylesheet"
          href="/style/home.css">

</head>

<body>

    <!--========================================-->
    <!-- HEADER -->
    <!--========================================-->

    <header>

        <div class="container header-container">

            <!-- Logo -->
            <div class="logo-area">

                <img id="logo"
                     src=""
                     alt="">

            </div>

            <!-- Pesquisa -->
            <div class="search-area">

                <input
                    id="campoPesquisa"
                    type="text"
                    placeholder="">

            </div>

            <!-- Menu Superior -->
            <div id="menuSuperior"
                 class="menu-superior">

                <!-- Criado pelo JavaScript -->

            </div>

        </div>

    </header>

    <!--========================================-->
    <!-- MENU -->
    <!--========================================-->

    <nav class="menu-principal">

        <ul id="menuHorizontal">

            <!-- Criado pelo JavaScript -->

        </ul>

    </nav>

    <!--========================================-->
    <!-- BANNERS -->
    <!--========================================-->

    <section class="banner-section">

        <div id="bannerPrincipal"
             class="banner-principal">

        </div>

        <div id="bannerSecundario"
             class="banner-secundario">

        </div>

    </section>

    <!--========================================-->
    <!-- OFERTAS -->
    <!--========================================-->

    <main>

        <section class="container">

            <div class="titulo-section">

                <h2 id="tituloOfertas"></h2>

            </div>

            <div id="listaProdutos"
                 class="produtos-grid">

                <!-- Produtos criados pelo JavaScript -->

            </div>

        </section>

    </main>

    <!--========================================-->
    <!-- RODAPÉ -->
    <!--========================================-->

    <footer>

        <div class="container footer-container">

            <div id="footerEsquerda">

            </div>

            <div id="footerCentro">

            </div>

            <div id="footerDireita">

            </div>

        </div>

    </footer>

    <script src="/js/home.js"></script>

</body>

</html>
